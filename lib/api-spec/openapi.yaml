openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: HyperLocal Business Engine API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user management
  - name: marketplaces
    description: Marketplace discovery
  - name: categories
    description: Category hierarchy
  - name: locations
    description: Geographic location hierarchy
  - name: businesses
    description: Business profiles
  - name: inventory
    description: Products and services offered by businesses
  - name: portfolio
    description: Business portfolio showcase
  - name: reviews
    description: Customer reviews and ratings
  - name: engagement
    description: Saved items and engagement tracking
  - name: search
    description: Full-text and filtered business search
  - name: templates
    description: Location and category template management
  - name: claims
    description: Business claim requests
  - name: admin
    description: Admin and operator endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ────────────────────────────────────────────────────────────────────

  /v1/auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /v1/auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /v1/auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Invalidate current session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /v1/auth/me:
    get:
      operationId: authMe
      tags: [auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /v1/auth/verify-email:
    post:
      operationId: authVerifyEmail
      tags: [auth]
      summary: Verify email address with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Marketplaces ─────────────────────────────────────────────────────────────

  /v1/marketplaces/{slug}:
    get:
      operationId: getMarketplace
      tags: [marketplaces]
      summary: Get marketplace by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marketplace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Categories ───────────────────────────────────────────────────────────────

  /v1/categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List root or child categories
      parameters:
        - name: parent
          in: query
          schema:
            type: string
          description: Parent category slug; omit for root categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CategorySummary"

  /v1/categories/{slug}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category with its children
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category with children
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CategoryDetail"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Locations ────────────────────────────────────────────────────────────────

  /v1/locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List locations for a country (optionally filtered by parent or level)
      parameters:
        - name: country
          in: query
          required: true
          schema:
            type: string
          description: ISO country code (e.g. NG)
        - name: parent
          in: query
          schema:
            type: string
          description: Parent location slug to get children
        - name: level
          in: query
          schema:
            type: integer
          description: Level number (1=state, 2=LGA, 3=town)
      responses:
        "200":
          description: Location list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LocationListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /v1/locations/{slug}:
    get:
      operationId: getLocation
      tags: [locations]
      summary: Get a location with its children
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
          description: ISO country code to disambiguate
      responses:
        "200":
          description: Location detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/LocationDetail"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Businesses ───────────────────────────────────────────────────────────────

  /v1/businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List active businesses in a marketplace
      parameters:
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
          description: Marketplace slug (or use X-Marketplace-Slug header)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque pagination cursor
      responses:
        "200":
          description: Paginated business list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBusinessList"
        "404":
          $ref: "#/components/responses/NotFoundError"

    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business profile
      security:
        - bearerAuth: []
      parameters:
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessRequest"
      responses:
        "201":
          description: Business created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /v1/businesses/mine:
    get:
      operationId: listMyBusinesses
      tags: [businesses]
      summary: List businesses owned by the authenticated user in this marketplace
      security:
        - bearerAuth: []
      parameters:
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
          description: Marketplace slug
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque pagination cursor
      responses:
        "200":
          description: Paginated list of businesses owned by the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBusinessList"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /v1/businesses/{slug}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business profile by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessDetail"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /v1/businesses/{id}:
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business profile
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRequest"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Soft-delete a business (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Business deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Location Search ───────────────────────────────────────────────────────────

  /v1/locations/search:
    get:
      operationId: searchLocations
      tags: [locations]
      summary: Trigram + prefix fuzzy search across locations
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query (min 1 character)
        - name: country
          in: query
          schema:
            type: string
          description: ISO country code filter (e.g. NG)
        - name: level
          in: query
          schema:
            type: integer
          description: Location level number filter
        - name: parent
          in: query
          schema:
            type: string
          description: Parent location slug filter
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching locations with similarity score
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        slug:
                          type: string
                        fullName:
                          type: string
                          nullable: true
                        levelNumber:
                          type: integer
                        parentId:
                          type: string
                          nullable: true
                        country:
                          type: object
                          properties:
                            name:
                              type: string
                            isoCode:
                              type: string
                        score:
                          type: string
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "400":
          $ref: "#/components/responses/ValidationError"

  # ── Marketplace Config ────────────────────────────────────────────────────────

  /v1/marketplaces/{slug}/location-config:
    get:
      operationId: getMarketplaceLocationConfig
      tags: [marketplaces]
      summary: Get location template configuration for a marketplace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marketplace location configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object

  /v1/marketplaces/{slug}/category-config:
    get:
      operationId: getMarketplaceCategoryConfig
      tags: [marketplaces]
      summary: Get category template configuration for a marketplace
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marketplace category configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object

  # ── Business Hours ────────────────────────────────────────────────────────────

  /v1/businesses/{businessId}/hours:
    get:
      operationId: getBusinessHours
      tags: [businesses]
      summary: Get business opening hours
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Business hours (0=Sun … 6=Sat)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusinessHour"
    put:
      operationId: upsertBusinessHours
      tags: [businesses]
      summary: Bulk upsert business hours (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hours]
              properties:
                hours:
                  type: array
                  items:
                    $ref: "#/components/schemas/BusinessHourInput"
      responses:
        "200":
          description: Updated hours
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusinessHour"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  # ── Business Contacts ─────────────────────────────────────────────────────────

  /v1/businesses/{businessId}/contacts:
    get:
      operationId: listBusinessContacts
      tags: [businesses]
      summary: List contacts for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BusinessContact"
    post:
      operationId: createBusinessContact
      tags: [businesses]
      summary: Add a contact to a business (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessContactInput"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessContact"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /v1/businesses/{businessId}/contacts/{contactId}:
    patch:
      operationId: updateBusinessContact
      tags: [businesses]
      summary: Update a business contact (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessContactInput"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/BusinessContact"
    delete:
      operationId: deleteBusinessContact
      tags: [businesses]
      summary: Delete a business contact (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: contactId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Contact deleted

  # ── Business Branches ─────────────────────────────────────────────────────────

  /v1/businesses/{businessId}/branches:
    get:
      operationId: listBusinessBranches
      tags: [businesses]
      summary: List branches for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Branch list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      operationId: createBusinessBranch
      tags: [businesses]
      summary: Add a branch location (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                locationId:
                  type: string
                  format: uuid
                addressLine1:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                isPrimary:
                  type: boolean
      responses:
        "201":
          description: Branch created
        "400":
          $ref: "#/components/responses/ValidationError"

  /v1/businesses/{businessId}/branches/{branchId}:
    patch:
      operationId: updateBusinessBranch
      tags: [businesses]
      summary: Update a branch location (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                locationId:
                  type: string
                  format: uuid
                addressLine1:
                  type: string
                latitude:
                  type: number
                longitude:
                  type: number
                isPrimary:
                  type: boolean
      responses:
        "200":
          description: Branch updated
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      operationId: deleteBusinessBranch
      tags: [businesses]
      summary: Remove a branch location (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: branchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Branch deleted
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Business Service Areas ────────────────────────────────────────────────────

  /v1/businesses/{businessId}/service-areas:
    get:
      operationId: listBusinessServiceAreas
      tags: [businesses]
      summary: List service areas for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Service area list with location detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      operationId: addBusinessServiceArea
      tags: [businesses]
      summary: Add a service area (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locationId]
              properties:
                locationId:
                  type: string
                  format: uuid
                radiusKm:
                  type: string
      responses:
        "201":
          description: Service area added

  /v1/businesses/{businessId}/service-areas/{areaId}:
    delete:
      operationId: deleteBusinessServiceArea
      tags: [businesses]
      summary: Remove a service area (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: areaId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: marketplace
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Service area removed
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ── Products ──────────────────────────────────────────────────────────────────

