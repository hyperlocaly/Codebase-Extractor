components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFoundError:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ConflictError:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object

    Portfolio:
      type: object
      required: [id, businessId, title, status, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        businessId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        featuredImage:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [draft, published]
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deletedAt:
          type: string
          format: date-time
          nullable: true

    PortfolioItem:
      type: object
      required: [id, portfolioId, mediaUrl, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        portfolioId:
          type: string
          format: uuid
        mediaUrl:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
          nullable: true
        caption:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        externalUrl:
          type: string
          format: uri
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PortfolioCollection:
      allOf:
        - $ref: "#/components/schemas/Portfolio"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/PortfolioItem"

    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    MessageResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [message]
          properties:
            message:
              type: string

    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
          minLength: 2
          maxLength: 80
        phone:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthUser:
      type: object
      required: [id, email, displayName, status, emailVerified]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
        status:
          type: string
        emailVerified:
          type: boolean

    AuthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, accessToken, expiresAt]
          properties:
            user:
              $ref: "#/components/schemas/AuthUser"
            accessToken:
              type: string
            expiresAt:
              type: string
              format: date-time

    UserProfileResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, email, displayName, status, emailVerified]
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
            displayName:
              type: string
            phone:
              type: string
              nullable: true
            avatarUrl:
              type: string
              nullable: true
            status:
              type: string
            locale:
              type: string
              nullable: true
            emailVerified:
              type: boolean
            createdAt:
              type: string
              format: date-time

    CategorySummary:
      type: object
      required: [id, name, slug, depth, sortOrder]
      properties:
        id:
          type: string
          format: uuid
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        iconUrl:
          type: string
          nullable: true
        depth:
          type: integer
        sortOrder:
          type: integer

    CategoryDetail:
      allOf:
        - $ref: "#/components/schemas/CategorySummary"
        - type: object
          properties:
            children:
              type: array
              items:
                $ref: "#/components/schemas/CategorySummary"

    LocationSummary:
      type: object
      required: [id, name, slug, levelNumber]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        fullName:
          type: string
          nullable: true
        levelNumber:
          type: integer
        parentId:
          type: string
          format: uuid
          nullable: true

    LocationDetail:
      allOf:
        - $ref: "#/components/schemas/LocationSummary"
        - type: object
          properties:
            latitude:
              type: number
              nullable: true
            longitude:
              type: number
              nullable: true
            countryId:
              type: string
              format: uuid
            children:
              type: array
              items:
                $ref: "#/components/schemas/LocationSummary"

    LocationListResponse:
      type: object
      required: [country, locations]
      properties:
        country:
          type: object
          required: [id, name]
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        locations:
          type: array
          items:
            $ref: "#/components/schemas/LocationSummary"

    MarketplaceResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, slug, name, status]
          properties:
            id:
              type: string
              format: uuid
            slug:
              type: string
            name:
              type: string
            tagline:
              type: string
              nullable: true
            description:
              type: string
              nullable: true
            status:
              type: string
            domain:
              type: string
              nullable: true
            logoUrl:
              type: string
              nullable: true
            primaryColor:
              type: string
              nullable: true
            country:
              type: object
              properties:
                id:
                  type: string
                name:
                  type: string
                isoCode:
                  type: string
                phoneCode:
                  type: string
            currency:
              type: object
              properties:
                id:
                  type: string
                code:
                  type: string
                name:
                  type: string
                symbol:
                  type: string

    BusinessSummary:
      type: object
      required: [id, name, slug, status]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
          nullable: true
        status:
          type: string
        claimStatus:
          type: string
          nullable: true
        verificationScore:
          type: number
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        primaryPhone:
          type: string
          nullable: true
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        addressLine1:
          type: string
          nullable: true
        location:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            fullName:
              type: string
              nullable: true

    BusinessDetail:
      allOf:
        - $ref: "#/components/schemas/BusinessSummary"
        - type: object
          properties:
            description:
              type: string
              nullable: true
            addressLine1:
              type: string
              nullable: true
            addressLine2:
              type: string
              nullable: true
            latitude:
              type: number
              nullable: true
            longitude:
              type: number
              nullable: true
            primaryEmail:
              type: string
              nullable: true
            websiteUrl:
              type: string
              nullable: true
            updatedAt:
              type: string
              format: date-time
            categories:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  slug:
                    type: string
                  isPrimary:
                    type: boolean
            contacts:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  contactType:
                    type: string
                  value:
                    type: string
                  isPrimary:
                    type: boolean
                  isVerified:
                    type: boolean

    CreateBusinessRequest:
      type: object
      required: [name, categoryIds]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        tagline:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        locationId:
          type: string
          format: uuid
        addressLine1:
          type: string
          maxLength: 200
        addressLine2:
          type: string
          maxLength: 200
        whatsappNumber:
          type: string
          maxLength: 20
        primaryPhone:
          type: string
          maxLength: 20
        primaryEmail:
          type: string
          format: email
        websiteUrl:
          type: string
          format: uri
        categoryIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1

    UpdateBusinessRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        tagline:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        locationId:
          type: string
          format: uuid
        addressLine1:
          type: string
          maxLength: 200
        addressLine2:
          type: string
          maxLength: 200
        whatsappNumber:
          type: string
          maxLength: 20
        primaryPhone:
          type: string
          maxLength: 20
        primaryEmail:
          type: string
          format: email
        websiteUrl:
          type: string
          format: uri

    PaginationMeta:
      type: object
      required: [nextCursor, hasMore, count]
      properties:
